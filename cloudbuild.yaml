steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/lang1511/chinese-flashcards-repo/chinese-flashcards'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/lang1511/chinese-flashcards-repo/chinese-flashcards'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'chinese-flashcards'
      - '--image=us-central1-docker.pkg.dev/lang1511/chinese-flashcards-repo/chinese-flashcards'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--project=lang1511'

images:
  - 'us-central1-docker.pkg.dev/lang1511/chinese-flashcards-repo/chinese-flashcards'
